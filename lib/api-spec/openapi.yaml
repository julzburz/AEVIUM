  # ── AI Credentials ─────────────────────────────────────────────────────────
  /projects/{projectId}/ai-credentials:
    get:
      operationId: listAiCredentials
      tags: [aiCredentials]
      summary: List AI provider credentials for a project
      parameters:
        - name: projectId
          in: path
          required: true
