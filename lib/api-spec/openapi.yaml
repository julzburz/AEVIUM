components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    # ── Project ──────────────────────────────────────────────────────────────
    Project:
      type: object
      properties:
        id:
          type: integer
        userId:
          type: string
        name:
          type: string
        description:
          type: ["string", "null"]
        type:
          type: string
          enum: [novel, saga, articles, screenplay, other]
        primaryLanguage:
          type: string
        status:
          type: string
          enum: [active, archived, completed]
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - userId
        - name
        - type
        - primaryLanguage
        - status
        - createdAt
        - updatedAt

    CreateProjectBody:
      type: object
      properties:
        name:
          type: string
        description:
          type: ["string", "null"]
        type:
          type: string
          enum: [novel, saga, articles, screenplay, other]
        primaryLanguage:
          type: string
        status:
          type: string
          enum: [active, archived, completed]
      required:
        - name
        - type
        - primaryLanguage

    UpdateProjectBody:
      type: object
      properties:
        name:
          type: string
        description:
          type: ["string", "null"]
        type:
          type: string
          enum: [novel, saga, articles, screenplay, other]
        primaryLanguage:
          type: string
        status:
          type: string
          enum: [active, archived, completed]

    ProjectSummary:
      type: object
      properties:
        projectId:
          type: integer
        totalBooks:
          type: integer
        totalChapters:
          type: integer
        totalScenes:
          type: integer
        totalWords:
          type: integer
        totalCharacters:
          type: integer
        lastEditedAt:
          type: ["string", "null"]
          format: date-time
      required:
        - projectId
        - totalBooks
        - totalChapters
        - totalScenes
        - totalWords
        - totalCharacters
        - lastEditedAt

    DashboardData:
      type: object
      properties:
        projects:
          type: array
          items:
            $ref: "#/components/schemas/ProjectWithStats"
        totalProjects:
          type: integer
        recentActivity:
          type: array
          items:
            $ref: "#/components/schemas/RecentActivity"
      required:
        - projects
        - totalProjects
        - recentActivity

    ProjectWithStats:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: ["string", "null"]
        type:
          type: string
        primaryLanguage:
          type: string
        status:
          type: string
        totalBooks:
          type: integer
        totalChapters:
          type: integer
        totalWords:
          type: integer
        updatedAt:
          type: string
          format: date-time
        createdAt:
          type: string
