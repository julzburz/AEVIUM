kind = "web"
previewPath = "/"
title = "AEVIUM"
version = "1.0.0"
id = "artifacts/aevium"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23267

[services.development]
run = "pnpm --filter @workspace/aevium run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/aevium", "run", "build" ]
publicDir = "artifacts/aevium/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23267"
BASE_PATH = "/"
